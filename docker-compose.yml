services:
  postgres:
    image: postgres:15
    container_name: aurora_gems_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aurora_gems_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
